[plugin]
# 是否启用插件
enabled = true
config_version = "1.0.0"

[gateway]
# 文件发送适配器: "snowluma" 或 "napcat"
adapter = "snowluma"

[decode]
# 解码时发送的随机提示语（21条以内，支持 emoji）
progress_messages = [
    "🎵 正在解析旋律密码…",
    "🔍 正在揭开音乐的面纱…",
    "🎶 解码魔法施展中…",
    "📀 读取加密音频数据…",
    "✨ 正在还原纯净之声…",
    "🎧 解密进行中，稍候…",
    "🔐 密钥匹配成功，解包中…",
    "📡 正在唤醒音频精灵…",
    "🎼 音符正在挣脱枷锁…",
    "💿 磁道读取中，请勿离开…",
    "🎤 正在清理杂讯…",
    "🔊 解码引擎全速运转…",
    "🎹 音频样本重建中…",
    "📻 调频至无损波段…",
    "🎚️ 正在平衡声道…",
    "🎛️ 动态范围恢复中…",
    "💡 数据解密完毕，正在输出…",
    "🎵 即将为您送上原声…",
    "🔓 DRM 保护已剥离…",
    "🎁 准备发送无损文件…"
]

[test]
# 测试文件名（位于插件目录下的 test 文件夹内）
test_file = "伊格赛听 - 逍遥仙.ncm"
# 测试输出文件夹路径（相对于插件目录）
test_output_dir = "test_output"

[cleanup]
# 解码缓存文件的生命周期（秒），默认 86400 = 24 小时
cache_ttl_seconds = 86400
# 每次收到新文件时是否主动清理过期缓存
clean_on_request = true