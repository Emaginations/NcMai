[plugin]
# 是否启用插件
enabled = true
config_version = "1.0.0"

[gateway]
# 文件发送适配器，可选 "snowluma" 或 "napcat"
adapter = "snowluma"

[decode]
# 提示语风格，可选 "daily"（日常）、"cute"（可爱）、"minimal"（极简）
progress_style = "daily"

[test]
# 是否启用 /ncm 测试命令
enable_test_command = true
# 测试账号 QQ 号（/ncm 命令仅对此用户生效，并将文件发送给此用户）
test_user_id = ""
